services:
  rsyslog:
    hostname: rsyslog{{.Task.Slot}}
    image: $RSYSLOG_IMAGE
    ports:
      - mode: host
        published: $RSYSLOG_UDP_PORT
        target: $RSYSLOG_UDP_PORT
        protocol: udp
      - mode: host
        published: $RSYSLOG_TCP_PORT
        target: $RSYSLOG_TCP_PORT
        protocol: tcp
    configs:
      - source: rsyslog_conf
        target: /etc/rsyslog.conf
    secrets:
      - source: vlogs_ca_crt
        target: /etc/rsyslog/tls/vlogs-ca.crt
    deploy:
      mode: replicated
      replicas: $RSYSLOG_REPLICAS
      placement:
        max_replicas_per_node: 1
        constraints:
          - node.labels.${STACK}_rsyslog == 1

configs:
  rsyslog_conf:
    file: ${CONFIGS}/rsyslog.conf

secrets:
  vlogs_ca_crt:
    file: ${SECRETS}/vlogs-ca.crt
